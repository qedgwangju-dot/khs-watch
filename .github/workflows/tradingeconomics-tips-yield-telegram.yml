name: Trading Economics 10Y TIPS Telegram

on:
  # Disabled for production delivery.
  # Cloudflare Worker `tips-yield-telegram` is now the only scheduled sender.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tradingeconomics-tips-yield-telegram
  cancel-in-progress: false

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Disabled
        run: |
          echo "Legacy GitHub TIPS Telegram workflow is disabled." >> "$GITHUB_STEP_SUMMARY"
          echo "Cloudflare Worker tips-yield-telegram is the only scheduled sender." >> "$GITHUB_STEP_SUMMARY"
