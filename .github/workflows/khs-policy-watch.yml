name: KHS policy watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Send a Telegram test message even when there is no alert"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write

concurrency:
  group: khs-policy-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      CREATE_GITHUB_ISSUE: "true"
      KHS_WATCH_MAX_ALERTS: "5"
      KHS_SOURCE_MAX_AGE_HOURS: "72"
      KHS_NUCLEAR_MAX_AGE_HOURS: "72"
      KHS_TRUSTED_NEWS_MAX_AGE_HOURS: "72"
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'KHS-policy-watch contact=please-set-secret' }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DART_WATCH_STOCK_CODES: ${{ vars.DART_WATCH_STOCK_CODES || '005930,000660,373220,051910,006400,112610,267260,010120,064350,010140,329180' }}
      DART_DAYS_BACK: "1"
      DART_INCLUDE_ALL_MAJOR: "false"
      DART_ALLOW_CORRECTIONS: "false"
      TELEGRAM_TEST: ${{ github.event.inputs.telegram_test || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check configuration
        run: |
          if [ -z "$SEC_USER_AGENT" ] || [ "$SEC_USER_AGENT" = "KHS-policy-watch contact=please-set-secret" ]; then
            echo "SEC_USER_AGENT: missing or default" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SEC_USER_AGENT: set" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "$DART_API_KEY" ]; then
            echo "DART_API_KEY: missing" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "DART_API_KEY: set" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare policy watch runtime patches
        run: python scripts/khs_policy_runtime_patch.py

      - name: Validate policy watch scripts
        run: |
          python -m py_compile scripts/khs_policy_watch.py
          python -m py_compile scripts/korea_presidential_postprocess.py
          python -m py_compile scripts/khs_korea_presidential_personnel_postprocess.py
          python -m py_compile scripts/khs_policy_alert_guardrails.py
          python -m py_compile scripts/khs_policy_alert_router.py
          python -m py_compile scripts/khs_domestic_telecom_policy_watch.py
          python -m py_compile scripts/khs_domestic_stablecoin_policy_watch.py
          python -m py_compile scripts/khs_transformer_tariff_policy_watch.py
          python -m py_compile scripts/khs_transformer_tariff_postprocess.py
          python -m py_compile scripts/khs_nuclear_policy_watch.py
          python -m py_compile scripts/khs_trusted_policy_news_watch.py
          python -m py_compile scripts/khs_telegram_delivery_guard.py
          python -m py_compile scripts/khs_policy_runtime_patch.py

      - name: Run policy watch
        run: python scripts/khs_policy_watch.py

      - name: Run domestic telecom policy watch
        if: always()
        run: python scripts/khs_domestic_telecom_policy_watch.py

      - name: Run domestic stablecoin policy watch
        if: always()
        run: python scripts/khs_domestic_stablecoin_policy_watch.py

      - name: Run transformer tariff policy watch
        if: always()
        run: python scripts/khs_transformer_tariff_policy_watch.py

      - name: Run nuclear AI power watch
        if: always()
        run: python scripts/khs_nuclear_policy_watch.py

      - name: Run trusted policy news watch
        if: always()
        run: python scripts/khs_trusted_policy_news_watch.py

      - name: Apply policy alert guardrails
        if: always()
        run: python scripts/khs_policy_alert_guardrails.py

      - name: Apply transformer tariff alert postprocess
        if: always()
        run: python scripts/khs_transformer_tariff_postprocess.py

      - name: Route policy alerts by lane
        if: always()
        run: python scripts/khs_policy_alert_router.py

      - name: Normalize Korea presidential personnel alert
        if: always()
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          alerts_path = pathlib.Path("out/khs_korea_presidential_personnel_alerts.json")
          if alerts_path.exists():
              subprocess.check_call([sys.executable, "scripts/khs_korea_presidential_personnel_postprocess.py"])
          else:
              print("Korea presidential postprocess skipped: no personnel alert.")
          PY

      - name: Apply Telegram delivery quality guard
        if: always()
        run: python scripts/khs_telegram_delivery_guard.py

      - name: Publish step summary
        if: always()
        run: |
          if [ -f out/khs_policy_watch.md ]; then
            cat out/khs_policy_watch.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "KHS policy watch did not produce a report." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f out/khs_korea_presidential_personnel.md ]; then
            printf '\n---\n' >> "$GITHUB_STEP_SUMMARY"
            cat out/khs_korea_presidential_personnel.md >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f out/khs_nuclear_policy_alert.md ]; then
            printf '\n---\n' >> "$GITHUB_STEP_SUMMARY"
            cat out/khs_nuclear_policy_alert.md >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f out/khs_trusted_policy_news_alert.md ]; then
            printf '\n---\n' >> "$GITHUB_STEP_SUMMARY"
            cat out/khs_trusted_policy_news_alert.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated seen state
        if: hashFiles('data/khs_policy_watch_seen.json') != '' || hashFiles('data/khs_domestic_telecom_policy_seen.json') != '' || hashFiles('data/khs_domestic_stablecoin_policy_seen.json') != '' || hashFiles('data/khs_transformer_tariff_policy_seen.json') != '' || hashFiles('data/khs_nuclear_policy_seen.json') != '' || hashFiles('data/khs_trusted_policy_news_seen.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/khs_policy_watch_seen.json data/khs_domestic_telecom_policy_seen.json data/khs_domestic_stablecoin_policy_seen.json data/khs_transformer_tariff_policy_seen.json data/khs_nuclear_policy_seen.json data/khs_trusted_policy_news_seen.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update KHS watch state"
          git push || true

      - name: Open policy alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/khs_policy_watch_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/khs_policy_watch_alert_title.txt)"
          body="$(cat out/khs_policy_watch_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing policy alert issue #$existing already open."
          fi

      - name: Open Korea presidential personnel alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/khs_korea_presidential_personnel_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/khs_korea_presidential_personnel_title.txt)"
          body="$(cat out/khs_korea_presidential_personnel_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing Korea presidential alert issue #$existing already open."
          fi

      - name: Open nuclear AI power alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/khs_nuclear_policy_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/khs_nuclear_policy_title.txt)"
          body="$(cat out/khs_nuclear_policy_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing nuclear alert issue #$existing already open."
          fi

      - name: Open trusted policy news alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/khs_trusted_policy_news_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/khs_trusted_policy_news_title.txt)"
          body="$(cat out/khs_trusted_policy_news_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing trusted policy news alert issue #$existing already open."
          fi

      - name: Send Telegram alert
        if: hashFiles('out/khs_policy_watch_alert.md') != '' || hashFiles('out/khs_korea_presidential_personnel_alert.md') != '' || hashFiles('out/khs_nuclear_policy_alert.md') != '' || hashFiles('out/khs_trusted_policy_news_alert.md') != '' || env.TELEGRAM_TEST == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          repo = os.environ.get("GITHUB_REPOSITORY", "qedgwangju-dot/khs-watch")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          telegram_test = os.environ.get("TELEGRAM_TEST", "false").lower() == "true"

          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if run_id else f"https://github.com/{repo}/actions"
          issue_url = f"https://github.com/{repo}/issues"

          lanes = [
              (
                  pathlib.Path("out/khs_policy_watch_alert_title.txt"),
                  pathlib.Path("out/khs_policy_watch_alert.md"),
                  "KHS policy watch alert",
              ),
              (
                  pathlib.Path("out/khs_korea_presidential_personnel_title.txt"),
                  pathlib.Path("out/khs_korea_presidential_personnel_alert.md"),
                  "KHS Korea presidential personnel alert",
              ),
              (
                  pathlib.Path("out/khs_nuclear_policy_title.txt"),
                  pathlib.Path("out/khs_nuclear_policy_alert.md"),
                  "KHS nuclear AI power alert",
              ),
              (
                  pathlib.Path("out/khs_trusted_policy_news_title.txt"),
                  pathlib.Path("out/khs_trusted_policy_news_alert.md"),
                  "KHS trusted policy news alert",
              ),
          ]

          messages = []
          for title_file, body_file, fallback_title in lanes:
              if not body_file.exists():
                  continue
              title = title_file.read_text(encoding="utf-8").strip() if title_file.exists() else fallback_title
              body = body_file.read_text(encoding="utf-8")
              messages.append((title, body))

          if not messages and telegram_test:
              report = pathlib.Path("out/khs_policy_watch.md")
              title = "KHS policy watch Telegram test"
              body = report.read_text(encoding="utf-8") if report.exists() else "KHS policy watch test message."
              messages.append((title, body))

          for title, body in messages:
              text = f"{title}\n\n{body[:3300]}\n\nActions: {run_url}\nIssues: {issue_url}"
              data = urllib.parse.urlencode({
                  "chat_id": chat_id,
                  "text": text[:4096],
                  "disable_web_page_preview": "true",
              }).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  resp.read()
          print(f"telegram_messages={len(messages)}")
          PY

          echo "Telegram: sent" >> "$GITHUB_STEP_SUMMARY"
