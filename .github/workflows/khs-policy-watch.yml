name: KHS policy watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Send a Telegram test message even when there is no alert"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write

concurrency:
  group: khs-policy-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      CREATE_GITHUB_ISSUE: "true"
      KHS_WATCH_MAX_ALERTS: "5"
      KHS_SOURCE_MAX_AGE_HOURS: "72"
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'KHS-policy-watch contact=please-set-secret' }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DART_WATCH_STOCK_CODES: ${{ vars.DART_WATCH_STOCK_CODES || '005930,000660,373220,051910,006400,112610,267260,010120,064350,010140,329180' }}
      DART_DAYS_BACK: "1"
      DART_INCLUDE_ALL_MAJOR: "false"
      DART_ALLOW_CORRECTIONS: "false"
      TELEGRAM_TEST: ${{ github.event.inputs.telegram_test || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check configuration
        run: |
          if [ -z "$SEC_USER_AGENT" ] || [ "$SEC_USER_AGENT" = "KHS-policy-watch contact=please-set-secret" ]; then
            echo "SEC_USER_AGENT: missing or default" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SEC_USER_AGENT: set" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "$DART_API_KEY" ]; then
            echo "DART_API_KEY: missing" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "DART_API_KEY: set" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Patch Korea presidential personnel watch
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("scripts/khs_policy_watch.py")
          text = p.read_text(encoding="utf-8")

          if "korea_presidential_personnel" not in text:
              constants = "\n".join([
                  "",
                  "KOREA_PRESIDENTIAL_PERSONNEL_KEYWORDS = [",
                  "    \"인사 발표\",",
                  "    \"인사 관련\",",
                  "    \"인사 브리핑\",",
                  "    \"인사발표\",",
                  "    \"임명\",",
                  "    \"임명했습니다\",",
                  "    \"임명하셨습니다\",",
                  "    \"지명\",",
                  "    \"지명했습니다\",",
                  "    \"내정\",",
                  "    \"후보자\",",
                  "    \"대통령비서실\",",
                  "    \"대통령실\",",
                  "    \"청와대\",",
                  "    \"국가안보실\",",
                  "]",
                  "",
                  "KOREA_PRESIDENTIAL_SENIOR_ROLE_KEYWORDS = [",
                  "    \"비서실장\",",
                  "    \"정책실장\",",
                  "    \"안보실장\",",
                  "    \"수석비서관\",",
                  "    \"수석\",",
                  "    \"대변인\",",
                  "    \"차장\",",
                  "    \"장관 후보자\",",
                  "    \"장관\",",
                  "    \"차관\",",
                  "    \"위원장\",",
                  "    \"금융위원장\",",
                  "    \"공정거래위원장\",",
                  "    \"방송통신위원장\",",
                  "    \"검찰총장\",",
                  "    \"국세청장\",",
                  "    \"관세청장\",",
                  "    \"금융감독원장\",",
                  "]",
              ])
              text = text.replace("\nSTAGE_KEYWORDS = {", constants + "\nSTAGE_KEYWORDS = {", 1)
              text = text.replace(
                  '    "company_filing": [\n',
                  '    "korea_presidential_personnel": [\n'
                  '        *KOREA_PRESIDENTIAL_PERSONNEL_KEYWORDS,\n'
                  '        *KOREA_PRESIDENTIAL_SENIOR_ROLE_KEYWORDS,\n'
                  '    ],\n'
                  '    "company_filing": [\n',
                  1,
              )
              text = text.replace(
                  '\nBSEE_STATIC_EXCLUDE = ["approval process", "forms", "about", "faq", "data center", "statistics"]',
                  '\nSECTOR_KEYWORDS["한국 대통령실/고위급 인사"] = [\n'
                  '    "대통령비서실", "대통령실", "청와대", "국가안보실", "비서실장", "정책실장", "안보실장",\n'
                  '    "수석비서관", "수석", "대변인", "차장", "장관", "차관", "위원장",\n'
                  ']\n\n'
                  'BSEE_STATIC_EXCLUDE = ["approval process", "forms", "about", "faq", "data center", "statistics"]',
                  1,
              )
              text = text.replace(
                  '    Source("White House proclamations", "https://www.whitehouse.gov/presidential-actions/proclamations/", "whitehouse_html"),\n',
                  '    Source("White House proclamations", "https://www.whitehouse.gov/presidential-actions/proclamations/", "whitehouse_html"),\n'
                  '    Source("Korea President briefings", "https://www.president.go.kr/briefings", "korea_president_html"),\n'
                  '    Source("Korea Policy Briefing presidential briefings", "https://www.korea.kr/briefing/briefingHomeList.do", "korea_president_html"),\n',
                  1,
              )
              text = text.replace(
                  'for fmt in ("%Y-%m-%dT%H:%M:%SZ", "%Y-%m-%dT%H:%M:%S%z", "%Y-%m-%d"):',
                  'for fmt in ("%Y-%m-%dT%H:%M:%SZ", "%Y-%m-%dT%H:%M:%S%z", "%Y-%m-%d", "%Y.%m.%d"):',
                  1,
              )
              parser = "\n".join([
                  "",
                  "def is_korea_presidential_personnel(text: str) -> bool:",
                  "    has_personnel_action = any(keyword in text for keyword in KOREA_PRESIDENTIAL_PERSONNEL_KEYWORDS)",
                  "    has_senior_role = any(keyword in text for keyword in KOREA_PRESIDENTIAL_SENIOR_ROLE_KEYWORDS)",
                  "    return has_personnel_action and has_senior_role",
                  "",
                  "",
                  "def parse_korea_president_html(text: str, source: Source) -> list[dict]:",
                  "    link_pattern = re.compile(r'<a\\b[^>]*href=[\\\"\\\'](?P<href>[^\\\"\\\']+)[\\\"\\\'][^>]*>(?P<label>.*?)</a>', re.I | re.S)",
                  "    date_pattern = re.compile(r'\\b20\\d{2}[.-]\\d{1,2}[.-]\\d{1,2}\\b')",
                  "    deduped: dict[str, dict] = {}",
                  "    for match in link_pattern.finditer(text):",
                  "        title = clean_text(match.group('label'))",
                  "        if len(title) < 4 or '인사' not in title:",
                  "            continue",
                  "        link = urllib.parse.urljoin(source.url, html.unescape(match.group('href')))",
                  "        link_lower = link.lower()",
                  "        if 'president.go.kr' not in link_lower and 'korea.kr' not in link_lower:",
                  "            continue",
                  "        context = clean_text(text[max(0, match.start() - 350): match.end() + 1000])",
                  "        detail_text, detail_error = fetch_text(link)",
                  "        detail_clean = clean_text(detail_text or '') if not detail_error else ''",
                  "        haystack = f'{title} {context} {detail_clean[:6000]}'",
                  "        if not is_korea_presidential_personnel(haystack):",
                  "            continue",
                  "        date_match = date_pattern.search(haystack)",
                  "        published = parse_date(date_match.group(0)) if date_match else None",
                  "        if not published:",
                  "            continue",
                  "        published = published.astimezone(KST).replace(hour=0, minute=0, second=0, microsecond=0)",
                  "        summary = clean_text(detail_clean[:700] or context[:700])",
                  "        deduped[link] = {",
                  "            'source': source.name,",
                  "            'title': title,",
                  "            'link': link,",
                  "            'summary': summary or f'{source.name} official personnel briefing: {title}',",
                  "            'published_kst': published.isoformat(),",
                  "        }",
                  "    return list(deduped.values())[:20]",
              ])
              text = text.replace("\n\ndef parse_fcc_html", parser + "\n\ndef parse_fcc_html", 1)
              text = text.replace(
                  '("court_order", "final_rule", "sanctions_tariffs_export", "presidential_action", "fda_decision")',
                  '("court_order", "final_rule", "sanctions_tariffs_export", "presidential_action", "korea_presidential_personnel", "fda_decision")',
                  1,
              )
              text = text.replace(
                  '("court_order", "final_rule", "permit_restart", "agency_order", "presidential_action", "fcc_decision_notice")',
                  '("court_order", "final_rule", "permit_restart", "agency_order", "presidential_action", "korea_presidential_personnel", "fcc_decision_notice")',
                  1,
              )
              text = text.replace(
                  '        elif source.kind == "whitehouse_html":\n'
                  '            items = parse_whitehouse_html(text or "", source)\n'
                  '        elif source.kind == "fcc_html":\n',
                  '        elif source.kind == "whitehouse_html":\n'
                  '            items = parse_whitehouse_html(text or "", source)\n'
                  '        elif source.kind == "korea_president_html":\n'
                  '            items = parse_korea_president_html(text or "", source)\n'
                  '        elif source.kind == "fcc_html":\n',
                  1,
              )
              text = text.replace(
                  '{"rss", "courtlistener", "kind_html", "federal_register_json", "whitehouse_html", "fcc_html"}',
                  '{"rss", "courtlistener", "kind_html", "federal_register_json", "whitehouse_html", "korea_president_html", "fcc_html"}',
                  1,
              )

              p.write_text(text, encoding="utf-8")

          PY
          python -m py_compile scripts/khs_policy_watch.py

      - name: Run policy watch
        run: python scripts/khs_policy_watch.py

      - name: Normalize Korea presidential personnel alert
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import datetime as dt
          import html
          import json
          import re
          import urllib.request

          report = Path("out/khs_policy_watch.md")
          alert_path = Path("out/khs_policy_watch_alert.md")
          title_path = Path("out/khs_policy_watch_alert_title.txt")
          alerts_json = Path("out/khs_policy_watch_alerts.json")
          now = dt.datetime.now(tz=ZoneInfo("Asia/Seoul"))

          def clean_text(value: str | None) -> str:
              if not value:
                  return ""
              value = re.sub(r"<script\b.*?</script>", " ", value, flags=re.I | re.S)
              value = re.sub(r"<style\b.*?</style>", " ", value, flags=re.I | re.S)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              return re.sub(r"\s+", " ", value).strip()

          def base_title(title: str) -> str:
              return re.sub(r"\s+20\d{2}[.]\d{1,2}[.]\d{1,2}$", "", title).strip()

          def fetch_article_body(item: dict) -> str:
              fallback = clean_text(item.get("summary") or item.get("title") or "")
              link = item.get("link") or ""
              if not link.startswith("http"):
                  return fallback[:700]
              try:
                  req = urllib.request.Request(link, headers={"User-Agent": "KHS-policy-watch contact=github-actions"})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      raw = resp.read().decode(resp.headers.get_content_charset() or "utf-8", errors="replace")
              except Exception:
                  return fallback[:700]
              plain = clean_text(raw)
              title = base_title(item.get("title") or "")
              if title and title in plain:
                  plain = plain.split(title, 1)[1]
              starts = [idx for marker in ("이재명 대통령은", "대통령은 오늘", "정부는 오늘") if (idx := plain.find(marker)) >= 0]
              if starts:
                  plain = plain[min(starts):]
              for marker in ("<자료출처", "자료출처=", "저작권정책", "이전다음기사 영역", "관련기사", "정책 NOW"):
                  cut = plain.find(marker)
                  if cut > 0:
                      plain = plain[:cut]
              return clean_text(plain or fallback)[:900]

          def is_personnel(item: dict) -> bool:
              return "korea_presidential_personnel" in (item.get("matched") or {})

          def sectors_for(text: str) -> list[str]:
              checks = [
                  ("경제안보/통상/공급망", ["경제안보", "관세", "공급망", "통상", "중동"]),
                  ("해양수산/항만/북극항로", ["해양수산", "해수부", "북극항로", "항만", "해양수도"]),
                  ("국가안보/방산", ["국가안보실", "국가안전보장회의", "자주국방", "군 구조", "육군"]),
                  ("검찰개혁/사법", ["민정수석", "검찰", "중수청", "공소청", "법무부"]),
                  ("보건복지/노동", ["사회수석", "보건의료", "노동", "약사"]),
                  ("대통령실 정책 컨트롤타워", ["대통령비서실", "수석", "차장", "비서실"]),
              ]
              found = [label for label, terms in checks if any(term in text for term in terms)]
              return found or ["한국 대통령실/고위급 인사"]

          def importance_for(text: str) -> str:
              high_terms = ["대통령비서실", "국가안보실", "경제안보", "수석비서관", "정책실장", "안보실장", "비서실장", "금융위원장", "공정거래위원장"]
              return "상" if any(term in text for term in high_terms) else "중"

          def render_personnel(idx: int, item: dict) -> list[str]:
              body = fetch_article_body(item)
              text = f"{item.get('title', '')} {body}"
              importance = importance_for(text)
              sectors = sectors_for(text)
              source = item.get("source") or "공식 출처"
              link = item.get("link") or ""
              published = item.get("published_kst") or "확인 불가"
              return [
                  f"## {idx}. [{importance}·확정] {item.get('title', '').strip()}",
                  "- 상태 변화: 대통령실/청와대 공식 인사 임명 확인",
                  f"- 원문/출처: [{source}]({link}) · 원천시각 {published} · 조회 {now:%H:%M KST}",
                  "- 한국장 영향: 시간표",
                  "- 영향 경로: 정책 인선, 정책 타임라인",
                  f"- 영향 섹터: {', '.join(sectors)}",
                  "- 반영 가능성: 중간. 공식 인사 발표라 정보 자체는 공개 반영됐을 수 있지만, 개별 섹터 영향은 후속 정책·업무지시 전까지 제한적입니다.",
                  "- 반대 근거: 인선 자체는 확정이나 매출·마진·할인율을 직접 바꾸는 정책 발표는 아직 아닙니다.",
                  "- 즉시 체크: 취임 직후 업무지시, 부처 정책 발표 일정, 예산·입법·규제 후속 조치",
                  f"- 핵심 근거: {body[:260]}",
                  "",
              ]

          def render_general(idx: int, item: dict) -> list[str]:
              matched_terms = sorted({term for terms in (item.get("matched") or {}).values() for term in terms})
              matched_keys = ", ".join((item.get("matched") or {}).keys()) or "정책/규제"
              return [
                  f"## {idx}. [{item.get('importance', '중')}·{item.get('status', '확정')}] {item.get('title', '').strip()}",
                  f"- 상태 변화: {matched_keys} 신호 확인 ({', '.join(matched_terms[:8])})",
                  f"- 원문/출처: [{item.get('source', 'source')}]({item.get('link', '')}) · 원천시각 {item.get('published_kst') or '확인 불가'} · 조회 {now:%H:%M KST}",
                  f"- 한국장 영향: {', '.join(item.get('impacts') or ['의사결정 영향 제한적'])}",
                  f"- 영향 경로: {', '.join(item.get('paths') or ['정책 타임라인'])}",
                  f"- 영향 섹터: {', '.join(item.get('sectors') or ['정책/규제 일반'])}",
                  "- 반영 가능성: 낮음~중간. 공식 원문/신뢰 소스 확인 후 한국장 확산 여부를 장전 레이더에서 재확인해야 합니다.",
                  "- 반대 근거: 제목·요약 기반 1차 감시라 원문 세부 조건, 시행일, 예외 조항, 개별 프로젝트 적용 여부 확인이 필요합니다.",
                  "- 즉시 체크: 원문 전문, 시행일/마감일, 한국 밸류체인 노출, 관련 해외 티커·ETF 반응",
                  "",
              ]

          def add_coverage_line(path: Path) -> None:
              if not path.exists():
                  return
              body = path.read_text(encoding="utf-8")
              if "대통령실/청와대 고위급 인사 브리핑:" in body:
                  return
              checks = []
              for label, pattern in [
                  ("대통령실", r"- Korea President briefings: ([^\n]+)"),
                  ("정책브리핑", r"- Korea Policy Briefing presidential briefings: ([^\n]+)"),
              ]:
                  match = re.search(pattern, body)
                  checks.append(f"{label} {match.group(1).strip()}" if match else f"{label} 확인 불가")
              line = "대통령실/청와대 고위급 인사 브리핑: " + ", ".join(checks)
              lines = body.splitlines()
              if lines and lines[0].startswith("🚨"):
                  lines.insert(1, line)
                  if len(lines) == 2 or lines[2] != "":
                      lines.insert(2, "")
              else:
                  lines.insert(0, line)
              path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if not alerts_json.exists():
              add_coverage_line(report)
              add_coverage_line(alert_path)
              raise SystemExit(0)

          try:
              alerts = json.loads(alerts_json.read_text(encoding="utf-8"))
          except Exception:
              add_coverage_line(report)
              add_coverage_line(alert_path)
              raise SystemExit(0)

          personnel_count = sum(1 for item in alerts if is_personnel(item))
          if personnel_count == 0:
              add_coverage_line(report)
              add_coverage_line(alert_path)
              raise SystemExit(0)

          lines = [f"🚨 KHS 정책·규제 고충격 워치 · {now:%Y년 %m월 %d일 %H:%M KST}", f"대통령실/청와대 고위급 인사 브리핑: 공식 인사 {personnel_count}건 확인", ""]
          for idx, item in enumerate(alerts, 1):
              lines.extend(render_personnel(idx, item) if is_personnel(item) else render_general(idx, item))
          lines.extend([
              "💡 워치 판단: 이번 실행의 대통령실/청와대 인사 신호는 돈 버는 능력이나 할인율보다 정책 인선과 시간표를 바꾸는 재료입니다. 실제 투자 재료화 여부는 후속 업무지시·정책 발표·예산/입법 일정에서 재확인해야 합니다.",
              "",
              "투자 조언이 아닌 참고용 정책·규제 알림입니다.",
          ])
          normalized = "\n".join(lines) + "\n"
          report.write_text(normalized, encoding="utf-8")
          alert_path.write_text(normalized, encoding="utf-8")
          title_path.write_text(f"KHS 정책 워치: 대통령실/청와대 고위급 인사 {personnel_count}건 확인\n", encoding="utf-8")
          PY

      - name: Publish step summary
        if: always()
        run: |
          if [ -f out/khs_policy_watch.md ]; then
            cat out/khs_policy_watch.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "KHS policy watch did not produce a report." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated seen state
        if: hashFiles('data/khs_policy_watch_seen.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/khs_policy_watch_seen.json
          git diff --cached --quiet || git commit -m "Update KHS policy watch state"
          git push || true

      - name: Open alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/khs_policy_watch_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/khs_policy_watch_alert_title.txt)"
          body="$(cat out/khs_policy_watch_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing alert issue #$existing already open."
          fi

      - name: Send Telegram alert
        if: hashFiles('out/khs_policy_watch_alert.md') != '' || env.TELEGRAM_TEST == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          repo = os.environ.get("GITHUB_REPOSITORY", "qedgwangju-dot/khs-watch")
          run_id = os.environ.get("GITHUB_RUN_ID", "")

          alert = pathlib.Path("out/khs_policy_watch_alert.md")
          title_file = pathlib.Path("out/khs_policy_watch_alert_title.txt")
          report = pathlib.Path("out/khs_policy_watch.md")

          if alert.exists():
              title = title_file.read_text(encoding="utf-8").strip() if title_file.exists() else "KHS policy watch alert"
              body = alert.read_text(encoding="utf-8")
          else:
              title = "KHS policy watch Telegram test"
              body = report.read_text(encoding="utf-8") if report.exists() else "KHS policy watch test message."

          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if run_id else f"https://github.com/{repo}/actions"
          issue_url = f"https://github.com/{repo}/issues"
          text = f"{title}\n\n{body[:3300]}\n\nActions: {run_url}\nIssues: {issue_url}"
          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text[:4096],
              "disable_web_page_preview": "true",
          }).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              resp.read()
          PY

          echo "Telegram: sent" >> "$GITHUB_STEP_SUMMARY"
