name: KHS White House agriculture high-impact watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: khs-whitehouse-agriculture-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      KHS_WHITEHOUSE_AGRI_MAX_AGE_HOURS: "72"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agriculture watch
        run: python -m py_compile scripts/khs_whitehouse_agriculture_watch.py

      - name: Scan White House agriculture policy
        run: python scripts/khs_whitehouse_agriculture_watch.py

      - name: Publish step summary
        if: always()
        run: |
          if [ -f out/khs_whitehouse_agriculture_alert.md ]; then
            cat out/khs_whitehouse_agriculture_alert.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "KHS White House agriculture watch did not produce an alert." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit White House agriculture seen state
        if: hashFiles('data/khs_whitehouse_agriculture_seen.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/khs_whitehouse_agriculture_seen.json
          git diff --cached --quiet || git commit -m "Update White House agriculture watch state"
          git push || true

      - name: Send Telegram alert
        if: hashFiles('out/khs_whitehouse_agriculture_alert.md') != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID missing"
            exit 0
          fi
          python - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          repo = os.environ.get("GITHUB_REPOSITORY", "qedgwangju-dot/khs-watch")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          title = pathlib.Path("out/khs_whitehouse_agriculture_title.txt").read_text(encoding="utf-8").strip()
          body = pathlib.Path("out/khs_whitehouse_agriculture_alert.md").read_text(encoding="utf-8")
          required = ["- 핵심:", "- 영향:", "- 투자 포인트:", "- 반대 근거:", "- 원문:"]
          missing = [item for item in required if item not in body]
          if missing:
              print(f"Telegram guard blocked agriculture alert: missing {missing}")
              raise SystemExit(0)
          blocked = ["원제:", "executive order", "presidential action", "federal register", "whitehouse_alerts="]
          visible = body.replace("https://www.whitehouse.gov/", "")
          for marker in blocked:
              if marker in visible.lower():
                  print(f"Telegram guard blocked agriculture alert: {marker}")
                  raise SystemExit(0)
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if run_id else f"https://github.com/{repo}/actions"
          text = f"{title}\n\n{body[:3300]}\n\nActions: {run_url}"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": text[:4096], "disable_web_page_preview": "true"}).encode("utf-8")
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data, method="POST")
          with urllib.request.urlopen(req, timeout=20) as resp:
              resp.read()
          PY
