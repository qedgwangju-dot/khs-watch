name: GAMEJOA policy watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: gamejoa-policy-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      CREATE_GITHUB_ISSUE: "true"
      GAMEJOA_WATCH_MAX_ALERTS: "5"
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'GAMEJOA-policy-watch contact=please-set-repo-variable' }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DART_WATCH_STOCK_CODES: ${{ vars.DART_WATCH_STOCK_CODES || '005930,000660,373220,051910,006400,112610,267260,010120,064350,010140,329180' }}
      DART_DAYS_BACK: "1"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check configuration
        run: |
          if [ -z "$SEC_USER_AGENT" ] || [ "$SEC_USER_AGENT" = "GAMEJOA-policy-watch contact=please-set-repo-variable" ]; then
            echo "SEC_USER_AGENT: 미설정 또는 기본값" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SEC_USER_AGENT: 설정됨" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "$DART_API_KEY" ]; then
            echo "DART_API_KEY: 미설정" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "DART_API_KEY: 설정됨" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: 미설정" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Telegram: 설정됨" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run policy watch
        run: python scripts/gamejoa_policy_watch.py

      - name: Publish step summary
        if: always()
        run: |
          if [ -f out/gamejoa_policy_watch.md ]; then
            cat out/gamejoa_policy_watch.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GAMEJOA policy watch did not produce a report." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Telegram alert
        if: hashFiles('out/gamejoa_policy_watch_alert.md') != ''
        run: |
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.getenv("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("Telegram: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured.")
              raise SystemExit(0)

          title_path = Path("out/gamejoa_policy_watch_alert_title.txt")
          body_path = Path("out/gamejoa_policy_watch_alert.md")
          title = title_path.read_text(encoding="utf-8").strip() if title_path.exists() else "GAMEJOA 정책 워치"
          body = body_path.read_text(encoding="utf-8").strip()
          text = f"{title}\n\n{body}"
          if len(text) > 3900:
              text = text[:3850].rstrip() + "\n\n(본문 일부 생략)"

          payload = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text,
              "disable_web_page_preview": "true",
          }).encode("utf-8")
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          with urllib.request.urlopen(urllib.request.Request(url, data=payload), timeout=25) as response:
              print(f"Telegram: sent ({response.status})")
          PY

      - name: Commit updated seen state
        if: hashFiles('data/gamejoa_policy_watch_seen.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gamejoa_policy_watch_seen.json
          git diff --cached --quiet || git commit -m "Update GAMEJOA policy watch state"
          git push || true

      - name: Open alert issue
        if: env.CREATE_GITHUB_ISSUE == 'true' && hashFiles('out/gamejoa_policy_watch_alert.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(head -n 1 out/gamejoa_policy_watch_alert_title.txt)"
          body="$(cat out/gamejoa_policy_watch_alert.md)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body "$body" --label "gamejoa,policy-watch" || \
            gh issue create --title "$title" --body "$body"
          else
            echo "Existing alert issue #$existing already open."
          fi
