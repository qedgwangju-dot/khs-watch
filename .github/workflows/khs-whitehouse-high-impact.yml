name: KHS White House high-impact watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: khs-whitehouse-high-impact-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan White House high-impact policy
        run: |
          python - <<'PY'
          import datetime as dt
          import hashlib
          import html
          import json
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from zoneinfo import ZoneInfo

          KST = ZoneInfo("Asia/Seoul")
          FORMAT_VERSION = "compact-v1"
          OUT_DIR = Path("out")
          DATA_DIR = Path("data")
          ALERT_PATH = OUT_DIR / "khs_whitehouse_high_impact_alert.md"
          TITLE_PATH = OUT_DIR / "khs_whitehouse_high_impact_title.txt"
          SEEN_PATH = DATA_DIR / "khs_whitehouse_high_impact_seen.json"

          SOURCES = [
              ("백악관 행정명령", "https://www.whitehouse.gov/presidential-actions/executive-orders/", "/presidential-actions/"),
              ("백악관 팩트시트", "https://www.whitehouse.gov/fact-sheets/", "/fact-sheets/"),
              ("백악관 대통령각서", "https://www.whitehouse.gov/presidential-actions/presidential-memoranda/", "/presidential-actions/"),
          ]
          STATIC_TITLE_EXCLUDE = {
              "privacy policy", "subscribe", "contact", "internships", "download the white house app",
              "fact sheets", "executive orders", "presidential actions", "presidential memoranda", "proclamations",
              "remarks", "releases", "research", "briefings & statements", "nominations & appointments",
              "nominations and appointments", "nomination sent", "nominations sent", "nomination and withdrawal",
              "nominations and withdrawal", "nominations and withdrawals", "sent to the senate", "withdrawal sent",
          }
          STATIC_PATHS = {
              "/fact-sheets",
              "/presidential-actions",
              "/presidential-actions/executive-orders",
              "/presidential-actions/nominations-appointments",
              "/presidential-actions/presidential-memoranda",
              "/presidential-actions/proclamations",
              "/briefings-statements",
              "/remarks",
              "/releases",
              "/research",
          }
          ARTICLE_PATH_PATTERN = re.compile(r"/20\d{2}/\d{2}/[^/]+$", re.I)
          DATE_PATTERN = re.compile(
              r"\b(?:January|February|March|April|May|June|July|August|September|October|November|December|"
              r"Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},\s+20\d{2}\b",
              re.I,
          )
          LINK_PATTERN = re.compile(r"<a\b[^>]*href=[\"'](?P<href>[^\"']+)[\"'][^>]*>(?P<label>.*?)</a>", re.I | re.S)

          TOPIC_META = {
              "quantum_innovation": {
                  "priority": 1,
                  "ko_title": "백악관, 양자혁신 행정명령 발표",
                  "headline": "양자혁신",
                  "core": "상무부·국방부·에너지부·NASA에 양자 센서·네트워크 구축 계획 수립을 지시한 정책 신호.",
                  "impact": "양자/AI/첨단기술, 반도체/AI, 방산/국가안보 | 시간표·할인율",
                  "point": "확정 매출은 아니지만 정책 시간표와 미 정부 조달 기대를 앞당기는 재료.",
                  "counter": "예산·조달·후속 공고 전까지는 테마 기대 중심.",
              },
              "crypto_attacks": {
                  "priority": 2,
                  "ko_title": "백악관, 첨단 암호 공격 대응 행정명령 발표",
                  "headline": "암호안보",
                  "core": "양자 시대 암호위협 대응과 국가안보 사이버 방어 강화를 공식화.",
                  "impact": "보안/암호, 반도체/AI, 방산/국가안보 | 시간표·할인율",
                  "point": "사이버보안·암호기술·국가안보 인프라 관심 확대 가능.",
                  "counter": "국내 상장사 실적 연결은 후속 조달·밸류체인 확인 전까지 제한적.",
              },
              "advanced_ai_security": {
                  "priority": 3,
                  "ko_title": "백악관, 첨단 AI 혁신·안보 행정명령 발표",
                  "headline": "AI안보",
                  "core": "첨단 AI 혁신과 국가안보 통제를 동시에 강화하는 정책 신호.",
                  "impact": "AI, 반도체, 데이터센터, 방산/국가안보 | 시간표·할인율",
                  "point": "AI 인프라·보안·반도체 공급망 기대를 키우는 정책 재료.",
                  "counter": "구체 예산·규제·조달 조건 전까지는 방향성 재료.",
              },
              "nuclear_energy": {
                  "priority": 4,
                  "ko_title": "백악관, 원전 인허가·핵연료 정책 행정명령 발표",
                  "headline": "원전정책",
                  "core": "원전 인허가, 핵연료 공급, 데이터센터 전력수요 대응을 정책 시간표로 공식화.",
                  "impact": "원전/전력기기, 전력망/데이터센터, 우라늄, 방산/국가안보 | 시간표·수급",
                  "point": "AI 전력수요와 원전 CAPEX 시간표를 동시에 자극하는 정책 재료.",
                  "counter": "대출 조건, 부지, NRC 인허가, 착공 일정 확인 전까지 실제 매출 연결은 제한적.",
              },
              "customs_enforcement": {
                  "priority": 5,
                  "ko_title": "백악관, 관세·통관 집행 강화 정책 발표",
                  "headline": "관세집행",
                  "core": "통관·관세 집행 강화로 수입 원가와 공급망 점검 부담이 커질 수 있는 정책 신호.",
                  "impact": "관세/수출주, 소비재, 물류, 공급망 | 마진·할인율",
                  "point": "관세 민감 업종의 비용과 납기 리스크를 다시 가격에 반영할 수 있는 재료.",
                  "counter": "품목·국가·시행일이 구체화되지 않으면 개별 종목 영향은 제한적.",
              },
              "financial_system": {
                  "priority": 6,
                  "ko_title": "백악관, 금융시스템 정책 방향 발표",
                  "headline": "금융정책",
                  "core": "미국 금융시스템 규제·감독 방향이 할인율과 위험자산 선호에 영향을 줄 수 있는 정책 신호.",
                  "impact": "은행/증권/핀테크, 달러 유동성, 위험자산 | 할인율·수급",
                  "point": "규제 완화·강화 방향에 따라 금융주와 성장주 밸류에이션 반응이 갈릴 수 있음.",
                  "counter": "구체 법안·감독지침·시행일 확인 전까지 방향성 재료.",
              },
              "fintech_regulatory_frameworks": {
                  "priority": 7,
                  "ko_title": "백악관, 핀테크 규제 프레임워크 정책 발표",
                  "headline": "핀테크규제",
                  "core": "금융기술 혁신과 규제 프레임워크 변화가 결제·가상자산·플랫폼 금융에 영향을 줄 수 있는 정책 신호.",
                  "impact": "핀테크, 결제, 가상자산, 플랫폼 금융 | 시간표·수급",
                  "point": "핀테크 규제 경로가 명확해지면 테마 수급과 밸류에이션 재평가가 가능.",
                  "counter": "감독기관 후속 규칙과 의회 입법 여부가 확인돼야 실적 연결 가능.",
              },
              "regenerative_agriculture": {
                  "priority": 8,
                  "ko_title": "백악관, 재생농업·농장 회복력 강화 행정명령 발표",
                  "headline": "농업식량안보",
                  "core": "USDA·HHS·EPA 축으로 정밀농업, 재생농업, 농장 현대화, 식품공급망 안정, 작물보호 대체기술 평가를 정책 시간표로 공식화.",
                  "impact": "농업/스마트팜, 농기계, 비료·농약/작물보호, 식품공급망 | 시간표·수급·마진",
                  "point": "EPA 등록·라벨링 검토, USDA 재생농업 파일럿 확대, 공공·민간 파트너십이 농업 투입재와 정밀농업 테마 수급을 자극할 수 있음.",
                  "counter": "확정 매출이나 즉시 조달 공고는 아니며, 예산 배정·세부 프로그램·품목별 규제 변화 확인 전까지 직접 실적 연결은 제한적.",
              },
          }

          def clean(value):
              value = re.sub(r"<script\b.*?</script>", " ", value or "", flags=re.I | re.S)
              value = re.sub(r"<style\b.*?</style>", " ", value, flags=re.I | re.S)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              return re.sub(r"\s+", " ", value).strip()

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers={"User-Agent": "KHS-whitehouse-watch contact=github-actions"})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode(resp.headers.get_content_charset() or "utf-8", errors="replace")

          def parse_date(text):
              match = DATE_PATTERN.search(text or "")
              if not match:
                  return None
              for fmt in ("%B %d, %Y", "%b %d, %Y"):
                  try:
                      return dt.datetime.strptime(match.group(0), fmt).replace(tzinfo=KST)
                  except ValueError:
                      pass
              return None

          def is_static_title(title):
              low_title = clean(title).lower()
              if len(low_title) < 8:
                  return True
              return low_title in STATIC_TITLE_EXCLUDE or any(marker in low_title for marker in STATIC_TITLE_EXCLUDE)

          def is_article_link(link, source_url, required_path):
              low_link = link.lower().rstrip("/")
              low_source = source_url.lower().rstrip("/")
              path = urllib.parse.urlparse(link).path.lower().rstrip("/")
              if low_link == low_source:
                  return False
              if "whitehouse.gov" not in low_link or required_path not in low_link:
                  return False
              if path in STATIC_PATHS:
                  return False
              if "nominations-appointments" in path:
                  return False
              if "nomination" in path and "sent-to-the-senate" in path:
                  return False
              return bool(ARTICLE_PATH_PATTERN.search(path))

          def classify(title, link):
              surface = f"{title} {link}".lower()
              rules = [
                  ("quantum_innovation", ["next frontier of quantum innovation", "quantum innovation"]),
                  ("crypto_attacks", ["advanced cryptographic attacks", "cryptographic attacks"]),
                  ("advanced_ai_security", ["advanced artificial intelligence innovation and security", "artificial intelligence innovation and security"]),
                  ("nuclear_energy", ["nuclear energy", "nuclear reactor", "nuclear reactors", "nuclear regulatory commission", "nrc"]),
                  ("customs_enforcement", ["strengthening customs enforcement", "customs enforcement"]),
                  ("financial_system", ["america's financial system", "financial system"]),
                  ("fintech_regulatory_frameworks", ["financial technology innovation", "regulatory frameworks"]),
                  ("regenerative_agriculture", ["advancing regenerative agriculture", "regenerative agriculture", "farm resilience", "strengthening american farm resilience"]),
              ]
              for key, hints in rules:
                  if any(hint in surface for hint in hints):
                      return key
              return None

          def links_from(source_url, required_path):
              try:
                  page = fetch(source_url)
              except Exception as exc:
                  print(f"whitehouse_source_failed={source_url} {type(exc).__name__}: {exc}")
                  return []
              found = []
              seen_links = set()
              for match in LINK_PATTERN.finditer(page):
                  title = clean(match.group("label"))
                  if is_static_title(title):
                      continue
                  link = urllib.parse.urljoin(source_url, html.unescape(match.group("href")))
                  if not is_article_link(link, source_url, required_path):
                      continue
                  if link in seen_links:
                      continue
                  seen_links.add(link)
                  found.append((title, link))
                  if len(found) >= 30:
                      break
              return found

          def read_article(title_hint, link):
              try:
                  raw = fetch(link)
              except Exception:
                  return title_hint, "", None
              text = clean(raw)
              title = title_hint
              h1 = re.search(r"<h1[^>]*>(?P<title>.*?)</h1>", raw, re.I | re.S)
              if h1:
                  title = clean(h1.group("title")) or title
              return title, text[:2200], parse_date(text)

          def load_seen():
              if not SEEN_PATH.exists():
                  return {"seen": {}, "updated_at_kst": ""}
              try:
                  return json.loads(SEEN_PATH.read_text(encoding="utf-8"))
              except Exception:
                  return {"seen": {}, "updated_at_kst": ""}

          now = dt.datetime.now(tz=KST)
          seen_payload = load_seen()
          seen = seen_payload.setdefault("seen", {})
          topic_items = {}

          for source_name, source_url, required_path in SOURCES:
              for title_hint, link in links_from(source_url, required_path):
                  title, body, published = read_article(title_hint, link)
                  if is_static_title(title) or not is_article_link(link, source_url, required_path):
                      continue
                  key = classify(title, link)
                  if not key:
                      continue
                  if not published:
                      continue
                  published = published.astimezone(KST).replace(hour=0, minute=0, second=0, microsecond=0)
                  if (now - published).total_seconds() / 3600 > 72:
                      continue
                  meta = TOPIC_META.get(key)
                  if not meta or key in topic_items:
                      continue
                  fingerprint = f"whitehouse-{FORMAT_VERSION}-{key}"
                  if fingerprint in seen:
                      continue
                  topic_items[key] = {
                      "source": source_name,
                      "title": title,
                      "link": link,
                      "published": published.isoformat(),
                      "fingerprint": fingerprint,
                      **meta,
                  }

          alerts = sorted(topic_items.values(), key=lambda item: item["priority"])[:5]
          OUT_DIR.mkdir(exist_ok=True)
          if alerts:
              DATA_DIR.mkdir(exist_ok=True)
              for item in alerts:
                  seen[item["fingerprint"]] = {
                      "title": item["ko_title"],
                      "original_title": item["title"],
                      "source": item["source"],
                      "link": item["link"],
                      "first_seen_kst": now.isoformat(timespec="seconds"),
                      "importance": "상",
                      "format": FORMAT_VERSION,
                  }
              seen_payload["updated_at_kst"] = now.isoformat(timespec="seconds")
              SEEN_PATH.write_text(json.dumps(seen_payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")

              headline = "·".join(item["headline"] for item in alerts[:3])
              lines = [
                  f"🚨 KHS 백악관 고충격 정책 워치 · {now:%Y년 %m월 %d일 %H:%M KST}",
                  f"백악관 {headline} 정책 문서 {len(alerts)}건 확인",
                  "",
              ]
              for idx, item in enumerate(alerts, 1):
                  lines.extend([
                      f"## {idx}. [상·확정] {item['ko_title']}",
                      f"- 핵심: {item['core']}",
                      f"- 영향: {item['impact']}",
                      f"- 투자 포인트: {item['point']}",
                      f"- 반대 근거: {item['counter']}",
                      f"- 원문: [{item['source']}]({item['link']}) · {item['published']} · 조회 {now:%H:%M KST}",
                      "",
                  ])
              lines.extend([
                  "💡 판단: 오늘 바뀐 것은 확정 매출보다 정책 시간표·테마 수급입니다. 후속 부처 공고, 예산·조달 조건, 관련 해외·국내 밸류체인 반응 확인 필요.",
                  "",
                  "투자 조언이 아닌 참고용 정책·규제 알림입니다.",
              ])
              report = "\n".join(lines) + "\n"
              ALERT_PATH.write_text(report, encoding="utf-8")
              TITLE_PATH.write_text(f"KHS 백악관 정책 워치: [상] {headline} 정책 문서 {len(alerts)}건\n", encoding="utf-8")
          else:
              print("whitehouse_alerts=0")

          print(f"whitehouse_alerts={len(alerts)}")
          PY

      - name: Commit White House seen state
        if: hashFiles('data/khs_whitehouse_high_impact_seen.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/khs_whitehouse_high_impact_seen.json
          git diff --cached --quiet || git commit -m "Update White House high-impact watch state"
          git push || true

      - name: Send Telegram alert
        if: hashFiles('out/khs_whitehouse_high_impact_alert.md') != ''
        env:
          KHS_POLICY_TELEGRAM_BOT_TOKEN: ${{ secrets.KHS_POLICY_TELEGRAM_BOT_TOKEN }}
          KHS_POLICY_TELEGRAM_CHAT_ID: ${{ secrets.KHS_POLICY_TELEGRAM_CHAT_ID }}
        run: |
          POLICY_TELEGRAM_BOT_TOKEN="$KHS_POLICY_TELEGRAM_BOT_TOKEN"
          POLICY_TELEGRAM_CHAT_ID="$KHS_POLICY_TELEGRAM_CHAT_ID"

          if [ -z "$POLICY_TELEGRAM_BOT_TOKEN" ] || [ -z "$POLICY_TELEGRAM_CHAT_ID" ]; then
            echo "KHS policy Telegram: KHS_POLICY_TELEGRAM_BOT_TOKEN/KHS_POLICY_TELEGRAM_CHAT_ID missing; skip wrong-room fallback"
            exit 0
          fi
          export POLICY_TELEGRAM_BOT_TOKEN POLICY_TELEGRAM_CHAT_ID
          python - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request
          token = os.environ["POLICY_TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["POLICY_TELEGRAM_CHAT_ID"]
          repo = os.environ.get("GITHUB_REPOSITORY", "qedgwangju-dot/khs-watch")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          title = pathlib.Path("out/khs_whitehouse_high_impact_title.txt").read_text(encoding="utf-8").strip()
          body = pathlib.Path("out/khs_whitehouse_high_impact_alert.md").read_text(encoding="utf-8")
          guard_text = f"{title}\n{body}".lower()
          blocked_markers = [
              "nominations & appointments",
              "nominations and appointments",
              "nominations sent to the senate",
              "nomination sent to the senate",
              "nomination and withdrawal sent to the senate",
              "sent to the senate",
              "nominations-appointments",
              "백악관, 고충격 정책 발표:",
              "원제:",
              "official white house app",
              "federal register",
              "white house executive order",
              "white house fact sheet",
          ]
          for marker in blocked_markers:
              if marker in guard_text:
                  print(f"Telegram guard blocked White House alert: {marker}")
                  raise SystemExit(0)
          required_markers = ["- 핵심:", "- 영향:", "- 투자 포인트:", "- 반대 근거:", "- 원문:"]
          missing = [marker for marker in required_markers if marker not in body]
          if missing:
              print(f"Telegram guard blocked White House alert: missing required fields {missing}")
              raise SystemExit(0)
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if run_id else f"https://github.com/{repo}/actions"
          text = f"{title}\n\n{body[:3300]}\n\nActions: {run_url}"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": text[:4096], "disable_web_page_preview": "true"}).encode("utf-8")
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data, method="POST")
          with urllib.request.urlopen(req, timeout=20) as resp:
              resp.read()
          PY
