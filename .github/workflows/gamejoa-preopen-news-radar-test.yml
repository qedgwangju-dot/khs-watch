name: GAMEJOA preopen news radar test send

on:
  push:
    paths:
      - ".github/gamejoa-preopen-news-radar-test-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gamejoa-preopen-news-radar-test
  cancel-in-progress: false

jobs:
  test-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RADAR_MAX_AGE_HOURS: "48"
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || vars.SEC_USER_AGENT || 'GAMEJOA-preopen-radar contact=please-set-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.KHS_POLICY_TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.KHS_POLICY_TELEGRAM_CHAT_ID }}
      SEND_TELEGRAM: "true"
      TELEGRAM_DRY_RUN: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and send strict GAMEJOA radar test
        run: python scripts/gamejoa_preopen_news_radar_fda_quality_runner.py

      - name: Publish report summary
        if: always()
        run: |
          if [ -f out/gamejoa_preopen_news_radar.md ]; then
            cat out/gamejoa_preopen_news_radar.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GAMEJOA strict test did not produce a report." >> "$GITHUB_STEP_SUMMARY"
          fi
