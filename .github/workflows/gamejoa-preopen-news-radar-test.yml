name: Preopen news radar test send

on:
  push:
    paths:
      - ".github/gamejoa-preopen-news-radar-test-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gamejoa-preopen-news-radar-test
  cancel-in-progress: false

jobs:
  test-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RADAR_MAX_AGE_HOURS: "48"
      DART_DAYS_BACK: "3"
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || vars.SEC_USER_AGENT || 'GAMEJOA-preopen-radar contact=please-set-secret' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DART_WATCH_STOCK_CODES: ${{ vars.DART_WATCH_STOCK_CODES || '005930,000660,373220,051910,006400,112610,267260,012450,079550,047810,064350,272210,010120,010140,329180' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SEND_TELEGRAM: "true"
      TELEGRAM_DRY_RUN: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and send compact radar test
        run: python scripts/gamejoa_preopen_news_radar_grid_policy_runner.py

      - name: Publish report summary
        if: always()
        run: |
          if [ -f out/gamejoa_preopen_news_radar.md ]; then
            cat out/gamejoa_preopen_news_radar.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Compact radar test did not produce a report." >> "$GITHUB_STEP_SUMMARY"
          fi
